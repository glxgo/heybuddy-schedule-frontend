name: heybuddy_schedule
description: "相伴课表 - 大学生社交化课表管理应用"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^15.1.2
  sqflite: ^2.3.0
  path_provider: ^2.0.0
  path: ^1.8.0
  webview_flutter: ^4.0.0
  dio: ^5.7.0
  image_picker: ^1.1.2
  shared_preferences: ^2.3.3
  intl: ^0.20.2
  permission_handler: ^11.3.1
  package_info_plus: ^8.1.2
  url_launcher: ^6.3.1
  file_picker: ^8.0.0
  yaml: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/schools/
    - index/
    - resources/
    - assets/images/
