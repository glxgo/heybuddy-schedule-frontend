name: heybuddy_schedule
description: "相伴课表 - 大学生社交化课表管理应用"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^15.1.2
  sqflite: ^2.4.1
  path_provider: ^2.1.5
  path: ^1.9.1
  webview_flutter: ^4.10.0
  dio: ^5.7.0
  image_picker: ^1.1.2
  shared_preferences: ^2.3.4
  intl: ^0.20.2
  permission_handler: ^11.3.1
  package_info_plus: ^8.1.2
  url_launcher: ^6.3.1
  file_picker: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/schools/
    - assets/adapters/
    - assets/images/
